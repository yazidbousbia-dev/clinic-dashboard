<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic — Gestion Utilisateurs</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    .user-avatar-sm { width:36px; height:36px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:600; overflow:hidden; flex-shrink:0; }
    .user-avatar-sm img { width:100%; height:100%; object-fit:cover; }
    .badge-admin     { background:#FEF3C7; color:#92400E; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:500; }
    .badge-doctor    { background:#DBEAFE; color:#1E40AF; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:500; }
    .badge-secretary { background:#F3E8FF; color:#6B21A8; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:500; }
    .badge-patient   { background:#DCFCE7; color:#166534; padding:2px 10px; border-radius:20px; font-size:11px; font-weight:500; }
  </style>
</head>
<body>
<div class="layout"></div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Modifier l'utilisateur</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('editModal')"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editUserId">
      <input type="file" id="editAvatarInput" accept="image/*" style="display:none" onchange="previewEditAvatar(this)">
      <div style="display:flex;justify-content:center;margin-bottom:18px">
        <div style="position:relative">
          <div id="editAvatarPreview" onclick="document.getElementById('editAvatarInput').click()"
               style="width:72px;height:72px;border-radius:50%;background:var(--primary-light);color:var(--primary);
                      display:flex;align-items:center;justify-content:center;font-weight:600;font-size:22px;
                      overflow:hidden;cursor:pointer;border:2px dashed var(--border)">
          </div>
          <div onclick="document.getElementById('editAvatarInput').click()"
               style="position:absolute;bottom:-2px;right:-2px;width:24px;height:24px;border-radius:50%;
                      background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;
                      font-size:12px;cursor:pointer;border:2px solid var(--surface)">
            <i class="ti ti-camera"></i>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input id="editName" type="text" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input id="editEmail" type="email" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input id="editPhone" type="text" class="form-control">
      </div>
      <div class="form-group">
        <label class="form-label">Rôle</label>
        <select id="editRole" class="form-control">
          <option value="admin">Administrateur</option>
          <option value="doctor">Médecin</option>
          <option value="secretary">Secrétaire</option>
          <option value="patient">Patient</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe <span style="color:var(--text-muted)">(laisser vide pour ne pas changer)</span></label>
        <input id="editPass" type="password" class="form-control" placeholder="••••••••">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('editModal')">Annuler</button>
      <button id="saveEditBtn" class="btn btn-primary" onclick="saveUser()">
        <i class="ti ti-device-floppy"></i> Enregistrer
      </button>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script>
initLayout('users', 'Gestion Utilisateurs');
const me = Auth.getUser();
if (me?.role !== 'admin') {
  window.location.href = 'dashboard.html';
}

const roleLabels = { admin:'Administrateur', doctor:'Médecin', secretary:'Secrétaire', patient:'Patient' };

async function loadUsers() {
  const content = document.getElementById('pageContent');
  content.innerHTML = `
    <div class="card" style="margin:20px">
      <div class="card-header">
        <span class="card-title">Tous les utilisateurs</span>
        <span id="userCount" class="badge badge-gray">—</span>
      </div>
      <div class="table-wrap" id="usersTable">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>`;

  try {
    const users = await api('GET', '/admin/users');
    document.getElementById('userCount').textContent = users.length;

    const table = document.getElementById('usersTable');
    if (!users.length) {
      table.innerHTML = '<div class="empty-state"><p>Aucun utilisateur</p></div>';
      return;
    }

    table.innerHTML = `
      <table>
        <thead><tr>
          <th>Utilisateur</th><th class="col-hide-sm">Email</th><th class="col-hide-sm">Téléphone</th>
          <th>Rôle</th><th class="col-hide-sm">Inscrit le</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${users.map(u => {
            const initials = u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
            const avatarHTML = u.avatar
              ? `<img src="${API_BASE}${u.avatar}?v=${Date.now()}" alt="">`
              : initials;
            const userJson = JSON.stringify(u).replace(/"/g,'&quot;');
            return `
              <tr onclick="openEdit(${userJson})">
                <td>
                  <div style="display:flex;align-items:center;gap:10px">
                    <div class="user-avatar-sm">${avatarHTML}</div>
                    <div>
                      <div style="font-weight:500">${u.name}</div>
                      <div style="font-size:11px;color:var(--text-muted)">#${u.id}</div>
                    </div>
                  </div>
                </td>
                <td class="col-hide-sm">${u.email}</td>
                <td class="col-hide-sm">${u.phone || '—'}</td>
                <td><span class="badge-${u.role}">${roleLabels[u.role] || u.role}</span></td>
                <td class="col-hide-sm">${fmtDate(u.created_at)}</td>
                <td onclick="event.stopPropagation()">
                  <div style="display:flex;gap:6px">
                    <button class="btn btn-ghost btn-sm" onclick="openEdit(${userJson})">
                      <i class="ti ti-edit"></i>
                    </button>
                    ${u.id !== me.id ? `
                    <button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteUser(${u.id}, '${u.name}')">
                      <i class="ti ti-trash"></i>
                    </button>` : ''}
                  </div>
                </td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    document.getElementById('usersTable').innerHTML = `<div class="empty-state"><p>${e.message}</p></div>`;
  }
}

let pendingAvatar = null;

function openEdit(u) {
  document.getElementById('editUserId').value  = u.id;
  document.getElementById('editName').value    = u.name;
  document.getElementById('editEmail').value   = u.email;
  document.getElementById('editPhone').value   = u.phone || '';
  document.getElementById('editRole').value    = u.role;
  document.getElementById('editPass').value    = '';
  pendingAvatar = null;

  const initials = u.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const preview = document.getElementById('editAvatarPreview');
  preview.innerHTML = u.avatar
    ? `<img src="${API_BASE}${u.avatar}?v=${Date.now()}" style="width:100%;height:100%;object-fit:cover">`
    : initials;

  openModal('editModal');
}

function previewEditAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Image trop grande (max 2MB)', 'error'); return; }
  const reader = new FileReader();
  reader.onload = (e) => {
    pendingAvatar = e.target.result;
    document.getElementById('editAvatarPreview').innerHTML =
      `<img src="${pendingAvatar}" style="width:100%;height:100%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
}

async function saveUser() {
  const btn = document.getElementById('saveEditBtn');
  const id  = document.getElementById('editUserId').value;
  const payload = {
    name:  document.getElementById('editName').value.trim(),
    email: document.getElementById('editEmail').value.trim(),
    phone: document.getElementById('editPhone').value.trim(),
    role:  document.getElementById('editRole').value,
  };
  const pass = document.getElementById('editPass').value;
  if (pass) payload.password = pass;
  if (pendingAvatar) payload.avatar = pendingAvatar;

  btn.disabled = true;
  try {
    await api('PUT', `/admin/users/${id}`, payload);
    showToast('Utilisateur mis à jour', 'success');
    closeModal('editModal');
    loadUsers();
  } catch(e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; }
}

async function deleteUser(id, name) {
  if (!confirm(`Supprimer l'utilisateur "${name}" ?`)) return;
  try {
    await api('DELETE', `/admin/users/${id}`);
    showToast('Utilisateur supprimé', 'success');
    loadUsers();
  } catch(e) { showToast(e.message, 'error'); }
}

loadUsers();
</script>
</body>
</html>
