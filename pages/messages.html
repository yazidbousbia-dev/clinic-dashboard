<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinic — Messages</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    .msg-layout { display: flex; height: calc(100vh - 130px); min-height: 420px; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--surface); }
    .msg-list { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; }
    .msg-list-item {
      padding: 13px 16px; border-bottom: 1px solid var(--border); cursor: pointer;
      display: flex; align-items: flex-start; gap: 10px; position: relative;
    }
    .msg-list-item:hover { background: var(--bg); }
    .msg-list-item.active { background: var(--primary-light); }
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: var(--primary);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .msg-list-name { font-size: 13px; font-weight: 600; }
    .msg-list-preview { font-size: 12px; color: var(--text-sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .msg-list-time { font-size: 10.5px; color: var(--text-sub); margin-left: auto; white-space: nowrap; }
    .msg-unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); position: absolute; top: 16px; right: 14px; }

    .msg-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .msg-panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .msg-panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 8px; background: var(--bg); }
    .msg-bubble { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.45; }
    .msg-bubble.me { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 3px; }
    .msg-bubble.them { align-self: flex-start; background: #fff; border: 1px solid var(--border); border-bottom-left-radius: 3px; }
    .msg-bubble.bot { align-self: flex-start; background: #F5F3FF; border: 1px solid #E0D7FC; border-bottom-left-radius: 3px; }
    .msg-bubble .meta { font-size: 10px; opacity: .7; margin-top: 3px; }
    .msg-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }
    .msg-input-row input { flex: 1; }
    .msg-empty-panel { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-sub); flex-direction: column; gap: 8px; }

    @media (max-width: 720px) {
      .msg-layout { flex-direction: column; height: auto; }
      .msg-list { width: 100%; max-height: 260px; border-right: none; border-bottom: 1px solid var(--border); }
      .msg-panel { min-height: 420px; }
    }
  </style>
</head>
<body>
<div class="layout"></div>

<script src="../js/utils.js"></script>
<script src="../js/layout.js"></script>
<script>
initLayout('messages', 'Messages');
const user = Auth.getUser();

let conversations = [];
let activeAppointmentId = null;
let chatPollTimer = null;

function initials(name) {
  return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function otherPartyName(conv) {
  return user.role === 'doctor' ? conv.patient_name : `Dr. ${conv.doctor_name}`;
}

async function loadPage() {
  document.getElementById('pageContent').innerHTML = `
    <div class="msg-layout">
      <div class="msg-list" id="convList"><div class="empty-state">Chargement…</div></div>
      <div class="msg-panel" id="msgPanel">
        <div class="msg-empty-panel">
          <i class="ti ti-message-circle" style="font-size:32px"></i>
          <div>Sélectionnez une conversation</div>
        </div>
      </div>
    </div>
  `;
  await loadConversations();
  setInterval(loadConversations, 8000); // refresh list (unread counts, new threads) periodically
}

async function loadConversations() {
  try {
    conversations = await api('GET', '/messages/conversations');
    renderConvList();
  } catch (e) {
    document.getElementById('convList').innerHTML = `<div class="empty-state"><i class="ti ti-alert-circle"></i><p>${e.message}</p></div>`;
  }
}

function renderConvList() {
  const wrap = document.getElementById('convList');
  if (!conversations.length) {
    wrap.innerHTML = '<div class="empty-state"><i class="ti ti-message-off"></i><p>Aucune conversation pour le moment.</p></div>';
    return;
  }

  wrap.innerHTML = conversations.map(c => {
    const name = otherPartyName(c);
    const preview = c.last_message ? c.last_message : `RDV du ${fmtDate(c.date)}`;
    const time = c.last_message_at ? new Date(c.last_message_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short' }) : '';
    return `
      <div class="msg-list-item ${activeAppointmentId === c.appointment_id ? 'active' : ''}" onclick="openConversation(${c.appointment_id})">
        <div class="msg-avatar">${initials(name)}</div>
        <div style="min-width:0;flex:1">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="msg-list-name">${name}</span>
            <span class="msg-list-time">${time}</span>
          </div>
          <div class="msg-list-preview">${preview}</div>
        </div>
        ${c.unread_count > 0 ? '<span class="msg-unread-dot"></span>' : ''}
      </div>
    `;
  }).join('');
}

function openConversation(appointmentId) {
  activeAppointmentId = appointmentId;
  renderConvList();

  const conv = conversations.find(c => c.appointment_id === appointmentId);
  const name = otherPartyName(conv);

  document.getElementById('msgPanel').innerHTML = `
    <div class="msg-panel-header">
      <div class="msg-avatar">${initials(name)}</div>
      <div>
        <div style="font-weight:600;font-size:13.5px">${name}</div>
        <div style="font-size:11.5px;color:var(--text-sub)">RDV du ${fmtDate(conv.date)} à ${conv.time?.slice(0,5) || ''} · ${statusBadge(conv.status)}</div>
      </div>
    </div>
    <div class="msg-panel-body" id="msgBody"><div class="empty-state">Chargement…</div></div>
    <div class="msg-input-row">
      <input id="msgInput" type="text" class="form-control" placeholder="Écrire une réponse…">
      <button class="btn btn-primary" onclick="sendReply()"><i class="ti ti-send"></i></button>
    </div>
  `;
  document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendReply(); });

  loadThread();
  clearInterval(chatPollTimer);
  chatPollTimer = setInterval(loadThread, 4000);
}

async function loadThread() {
  if (!activeAppointmentId) return;
  try {
    const messages = await api('GET', `/appointments/${activeAppointmentId}/messages`);
    const body = document.getElementById('msgBody');
    if (!body) return; // panel closed/changed since the request started
    const wasAtBottom = body.scrollTop + body.clientHeight >= body.scrollHeight - 20;

    if (!messages.length) {
      body.innerHTML = '<div class="empty-state" style="padding:24px 0">Aucun message. Écrivez le premier !</div>';
    } else {
      body.innerHTML = messages.map(m => {
        const isBot = m.sender.email === 'assistant@clinic.local';
        const cls = m.sender_id === user.id ? 'me' : (isBot ? 'bot' : 'them');
        return `
        <div class="msg-bubble ${cls}">
          ${escapeMsgHtml(m.body)}
          <div class="meta">${isBot ? '🤖 Assistant Clinique' : m.sender.name} · ${new Date(m.created_at).toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})}</div>
        </div>
      `;
      }).join('');
    }
    if (wasAtBottom) body.scrollTop = body.scrollHeight;

    // clear the unread dot for this conversation once we've read it
    const conv = conversations.find(c => c.appointment_id === activeAppointmentId);
    if (conv && conv.unread_count > 0) { conv.unread_count = 0; renderConvList(); }
  } catch (e) { /* silent while polling */ }
}

async function sendReply() {
  const input = document.getElementById('msgInput');
  const body = input.value.trim();
  if (!body || !activeAppointmentId) return;
  input.value = '';
  try {
    await api('POST', `/appointments/${activeAppointmentId}/messages`, { body });
    loadThread();
    loadConversations();
  } catch (e) { showToast('Message non envoyé', 'error'); }
}

function escapeMsgHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadPage();
</script>
</body>
</html>
